services:
  backend:
    build: ./nuvora-backend
    container_name: smartpark-backend
    environment:
      TZ: America/Bogota
      DATABASE_URL: "mysql+pymysql://app:app123@db:3306/test4"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
      SECRET_KEY: "your-super-secret-jwt-key-change-in-prod"
      SERVICE_API_KEY: "nuvora-service-key-2024-change-in-prod"
      DEFAULT_USERS_BOOTSTRAP_ENABLED: ${DEFAULT_USERS_BOOTSTRAP_ENABLED:-true}
      DEFAULT_USERS_FORCE_PASSWORD_RESET: ${DEFAULT_USERS_FORCE_PASSWORD_RESET:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_NOMBRE: ${ADMIN_NOMBRE:-Administrador}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234}
      OPERATOR_USERNAME: ${OPERATOR_USERNAME:-operador}
      OPERATOR_NOMBRE: ${OPERATOR_NOMBRE:-Operador}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-Operador1234}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
  vehicle-exit-service:
    build: ./vehicle-exit-service
    container_name: smartpark-vehicle-exit-service
    environment:
      TZ: America/Bogota
      SERVICE_NAME: vehicle-exit-service
      BACKEND_EXIT_URL: "http://backend:8000/api/events/vehicle-exit"
      SERVICE_API_KEY: "nuvora-service-key-2024-change-in-prod"
      AUTO_DETECTION_ENABLED: ${AUTO_DETECTION_ENABLED:-false}
      DETECTOR_PROVIDER: ${DETECTOR_PROVIDER:-fast-alpr}
      CAMERA_INDEX: ${CAMERA_INDEX:-0}
      CAMERA_POLL_INTERVAL_SECONDS: ${CAMERA_POLL_INTERVAL_SECONDS:-0.7}
      CAMERA_MIN_CONFIDENCE: ${CAMERA_MIN_CONFIDENCE:-0.85}
      CAMERA_ID: ${CAMERA_ID:-cam-salida-1}
    ports:
      - "8010:8010"
    depends_on:
      - backend
  vehicle-entry-service:
    build: ./vehicle-entry-service
    container_name: smartpark-vehicle-entry-service
    environment:
      TZ: America/Bogota
      SERVICE_NAME: vehicle-entry-service
      BACKEND_ENTRY_URL: "http://backend:8000/api/events/vehicle-entry"
      SERVICE_API_KEY: "nuvora-service-key-2024-change-in-prod"
      AUTO_DETECTION_ENABLED: ${ENTRY_AUTO_DETECTION_ENABLED:-false}
      DETECTOR_PROVIDER: ${ENTRY_DETECTOR_PROVIDER:-fast-alpr}
      CAMERA_INDEX: ${ENTRY_CAMERA_INDEX:-0}
      CAMERA_POLL_INTERVAL_SECONDS: ${ENTRY_CAMERA_POLL_INTERVAL_SECONDS:-0.7}
      CAMERA_MIN_CONFIDENCE: ${ENTRY_CAMERA_MIN_CONFIDENCE:-0.85}
      CAMERA_ID: ${ENTRY_CAMERA_ID:-cam-entrada-1}
    ports:
      - "8011:8010"
    depends_on:
      - backend
  frontend:
    build: ./nuvora-frontend
    container_name: smartpark-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
      - vehicle-exit-service
      - vehicle-entry-service
  db:
    image: mysql:8
    container_name: smartpark-db
    environment:
      TZ: America/Bogota
      MYSQL_ROOT_PASSWORD: 0000
      MYSQL_DATABASE: test4
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papp123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
